apiVersion: v1
kind: Service
metadata:
  name: service-jenkins
  namespace: jenkins
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /
    prometheus.io/port: "8080"
spec:
  selector:
    app: server-jenkins
  type: NodePort
  ports:
    - name: web
      port: 8080
      targetPort: 8080
      nodePort: 32000
    - name: jnlp
      port: 50000
      targetPort: 50000
      nodePort: 32001
